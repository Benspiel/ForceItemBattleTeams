# =========================
# ⏱ TIMER
# =========================

# Zeit pro Aufgabe (in Sekunden)
challenge-seconds: 300


# =========================
# 🟥 SKIPS
# =========================

# Wie viele Skips ein Spieler bekommt
max-skips: 3


# =========================
# 🎒 BACKPACK
# =========================

# Team Backpack aktivieren/deaktivieren
enable-backpack: true


# =========================
# 🔒 TEAM SYSTEM
# =========================

# Verhindert Team-Wechsel während des Spiels
team-lock: false


# =========================
# 🚫 ITEM BLACKLIST
# =========================

# Diese Items werden NICHT gewählt
blacklist:
  - BEDROCK
  - BARRIER
  - COMMAND_BLOCK
  - STRUCTURE_BLOCK
  - JIGSAW
  - SPAWNER


# =========================
# 👥 TEAMS (AUTOMATISCH)
# =========================

teams:
  team1: []
  team2: []
  team3: []
  team4: []
  team5: []
  team6: []
  team7: []
  team8: []